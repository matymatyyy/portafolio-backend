name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run ECS
        run: vendor/bin/ecs check --no-progress-bar

  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_db_test
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      APP_SECRET: ci_test_secret_key
      JWT_PASSPHRASE: ci-test-jwt-passphrase
      DATABASE_URL: "postgresql://app_user:app_password@localhost:5432/app_db_test?serverVersion=16&charset=utf8"
      REDIS_DSN: "redis://localhost:6379"
      CONTACT_RECIPIENT_EMAIL: test@example.com

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql, redis
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        run: |
          mkdir -p app/config/jwt
          openssl genpkey -algorithm RSA -out app/config/jwt/private.pem -aes256 -pass pass:$JWT_PASSPHRASE
          openssl rsa -pubout -in app/config/jwt/private.pem -out app/config/jwt/public.pem -passin pass:$JWT_PASSPHRASE

      - name: Initialize test database
        run: psql "postgresql://app_user:app_password@localhost:5432/app_db_test" -f liquibase/portafolio/changelog.sql

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite=unit

      - name: Run integration tests
        run: vendor/bin/phpunit --testsuite=integration

      - name: Run functional tests
        run: vendor/bin/phpunit --testsuite=functional
