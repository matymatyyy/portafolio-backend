name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run ECS
        run: vendor/bin/ecs check --no-progress-bar

  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_db_test
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        run: php bin/console lexik:jwt:generate-keypair
        env:
          APP_ENV: test

      - name: Create test database
        run: php bin/console doctrine:database:create --if-not-exists --env=test
        env:
          DATABASE_URL: "postgresql://app_user:app_password@localhost:5432/app_db_test?serverVersion=16&charset=utf8"

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
        env:
          DATABASE_URL: "postgresql://app_user:app_password@localhost:5432/app_db_test?serverVersion=16&charset=utf8"

      - name: Run unit tests
        run: php bin/phpunit --testsuite=unit

      - name: Run integration tests
        run: php bin/phpunit --testsuite=integration
        env:
          DATABASE_URL: "postgresql://app_user:app_password@localhost:5432/app_db_test?serverVersion=16&charset=utf8"

      - name: Run functional tests
        run: php bin/phpunit --testsuite=functional
        env:
          DATABASE_URL: "postgresql://app_user:app_password@localhost:5432/app_db_test?serverVersion=16&charset=utf8"
