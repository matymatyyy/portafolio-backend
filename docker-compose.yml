services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: portfolio_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html:cached
      - composer_cache:/root/.composer/cache
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://app_user:app_password@database:5432/app_db?serverVersion=16&charset=utf8"
    networks:
      - portfolio

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/public:/var/www/html/app/public:ro
    depends_on:
      - php
    networks:
      - portfolio

  database:
    image: postgres:16-alpine
    container_name: portfolio_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portfolio

  mailpit:
    image: axllent/mailpit:latest
    container_name: portfolio_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - ./mailpit/data:/data
    networks:
      - portfolio

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - portfolio

volumes:
  postgres_data:
  composer_cache:

networks:
  portfolio:
    driver: bridge
